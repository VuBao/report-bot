name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: 103.77.214.210
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /root/report-bot
            git pull origin main
            systemctl restart report-bot
